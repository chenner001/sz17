<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>侦探工作台 · 安全邮箱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Helvetica, "PingFang SC", "Microsoft YaHei", Roboto, Arial, sans-serif;
            color: #1e2a3a;
            height: 100vh;
            overflow: hidden;
        }

        .mail-app {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            background: #ffffff;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.02);
            transition: all 0.2s;
        }

        /* ========= 侧边栏 (桌面样式) ========= */
        .sidebar {
            width: 220px;
            background: #ffffff;
            border-right: 1px solid #f0f0f0;
            padding: 28px 16px;
            flex-shrink: 0;
        }

        .logo-area {
            margin-bottom: 40px;
            padding-left: 12px;
        }
        .logo {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #1e2a3a, #2c3e50);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .logo-sub {
            font-size: 12px;
            color: #8e9aaf;
            margin-top: 6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            margin: 4px 0;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            color: #3a4a5f;
            transition: all 0.2s;
            cursor: default;
        }
        .nav-item.active {
            background: #f0f2f5;
            color: #007aff;
        }
        .nav-item span:first-child {
            font-size: 18px;
            font-weight: 400;
        }

        /* ========= 邮件列表面板 ========= */
        .mail-list-panel {
            width: 360px;
            background: #ffffff;
            border-right: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .list-header {
            padding: 24px 20px 12px 20px;
            border-bottom: 1px solid #f0f0f2;
        }
        .list-header h3 {
            font-size: 20px;
            font-weight: 600;
            color: #1e2a3a;
        }
        .mail-count {
            font-size: 13px;
            color: #8e9aaf;
            margin-top: 6px;
        }

        .mail-items {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            -webkit-overflow-scrolling: touch;
        }

        .mail-item {
            padding: 16px 20px;
            border-bottom: 1px solid #f5f7fa;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }
        .mail-item:hover {
            background: #fafbfd;
        }
        .mail-item.active {
            background: #f0f7ff;
            border-left: 3px solid #007aff;
        }
        .mail-info {
            flex: 1;
            min-width: 0;
        }
        .mail-sender {
            font-weight: 600;
            font-size: 15px;
            color: #1e2a3a;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .attachment-badge {
            font-size: 11px;
            background: #eef2f7;
            padding: 2px 8px;
            border-radius: 30px;
            color: #5e6f8d;
            font-weight: normal;
            letter-spacing: 0.3px;
        }
        .mail-subject {
            font-size: 14px;
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .mail-preview {
            font-size: 12px;
            color: #8b9ab0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .mail-date {
            font-size: 12px;
            color: #9aa9bf;
            white-space: nowrap;
            margin-left: 8px;
            flex-shrink: 0;
        }

        /* ========= 邮件详情区域 ========= */
        .mail-detail {
            flex: 1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .detail-content {
            padding: 32px 40px;
            max-width: 720px;
            margin: 0 auto;
            width: 100%;
            word-break: break-word;
        }

        .detail-header {
            border-bottom: 1px solid #eff2f8;
            padding-bottom: 24px;
            margin-bottom: 24px;
        }
        .detail-subject {
            font-size: 24px;
            font-weight: 600;
            color: #1e2a3a;
            margin-bottom: 16px;
            line-height: 1.3;
            word-break: break-word;
        }
        .detail-meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 13px;
            color: #6b7c93;
        }
        .detail-sender strong {
            color: #1e2a3a;
            font-weight: 600;
        }
        .detail-date {
            color: #9aa9bf;
        }
        .detail-body {
            font-size: 15px;
            line-height: 1.55;
            color: #2c3e50;
            margin-bottom: 32px;
        }
        .detail-body p {
            margin-bottom: 16px;
        }
        .attachment-area {
            background: #f8fafd;
            border-radius: 16px;
            padding: 16px 20px;
            margin-top: 20px;
            border: 1px solid #edf2f7;
        }
        .attachment-title {
            font-size: 13px;
            font-weight: 600;
            color: #5e6f8d;
            margin-bottom: 12px;
            letter-spacing: 0.3px;
        }
        .attachment-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
            font-size: 13px;
            color: #007aff;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            min-height: 44px;
        }
        .attachment-item:hover {
            background: #f0f7ff;
            border-color: #007aff;
        }
        .paperclip-icon {
            font-size: 14px;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f0f2f6;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 8px;
        }

        .text-muted {
            color: #8b9ab0;
        }
        hr {
            border: none;
            border-top: 1px solid #eff2f8;
            margin: 20px 0;
        }
        button, a {
            background: none;
            border: none;
        }
        .btn-link {
            cursor: pointer;
        }

        /* ========= 响应式设计：手机 / 平板自适应 ========= */
        @media (max-width: 820px) {
            .mail-app {
                flex-direction: column;
                height: 100vh;
                overflow-y: auto;
                overflow-x: hidden;
            }
            /* 侧边栏改造为水平导航条 */
            .sidebar {
                width: 100%;
                padding: 12px 16px;
                border-right: none;
                border-bottom: 1px solid #f0f0f0;
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-wrap: wrap;
                gap: 12px;
                background: #ffffff;
                position: sticky;
                top: 0;
                z-index: 10;
            }
            .logo-area {
                margin-bottom: 0;
                padding-left: 0;
                display: flex;
                align-items: baseline;
                gap: 8px;
                flex-wrap: wrap;
            }
            .logo {
                font-size: 18px;
            }
            .logo-sub {
                font-size: 10px;
                margin-top: 0;
                color: #7b8ba3;
            }
            .nav-item {
                display: inline-flex;
                padding: 8px 14px;
                margin: 0;
                font-size: 14px;
                width: auto;
            }
            /* 邮件列表面板占据合适高度，不固定宽度 */
            .mail-list-panel {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #f0f0f0;
                max-height: 45vh;
                flex-shrink: 0;
                display: flex;
                flex-direction: column;
            }
            .mail-items {
                max-height: calc(45vh - 70px);
                overflow-y: auto;
            }
            /* 详情区域自动占据剩余高度 */
            .mail-detail {
                width: 100%;
                flex: 1;
                min-height: 50vh;
                overflow-y: auto;
            }
            .detail-content {
                padding: 24px 20px;
            }
            .detail-subject {
                font-size: 20px;
            }
            /* 邮件列表内文字换行优化，防止横向滚动 */
            .mail-subject, .mail-preview {
                white-space: normal;
                word-break: break-word;
                overflow: visible;
            }
            .mail-subject {
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .mail-preview {
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .mail-item {
                padding: 14px 16px;
                align-items: flex-start;
            }
            .mail-sender {
                font-size: 14px;
            }
            .mail-date {
                white-space: nowrap;
                font-size: 11px;
                margin-left: 6px;
            }
            .attachment-item {
                font-size: 14px;
                padding: 10px 18px;
            }
            /* 让附件区域按钮点击更舒适 */
            .attachment-item, .mail-item {
                cursor: pointer;
                -webkit-tap-highlight-color: rgba(0,122,255,0.1);
            }
        }

        /* 超小屏 (宽度 <= 480px) 进一步优化 */
        @media (max-width: 480px) {
            .sidebar {
                padding: 10px 12px;
                gap: 8px;
            }
            .nav-item {
                padding: 6px 10px;
                font-size: 13px;
                gap: 6px;
            }
            .logo {
                font-size: 16px;
            }
            .logo-sub {
                font-size: 9px;
            }
            .mail-list-panel {
                max-height: 40vh;
            }
            .mail-items {
                max-height: calc(40vh - 60px);
            }
            .detail-content {
                padding: 20px 16px;
            }
            .detail-subject {
                font-size: 18px;
            }
            .detail-body {
                font-size: 14px;
            }
            .mail-sender {
                font-size: 13px;
            }
            .attachment-badge {
                font-size: 10px;
                padding: 2px 6px;
            }
        }

        /* 横屏模式适配 (高度较小时让列表不过高) */
        @media (max-width: 900px) and (orientation: landscape) {
            .mail-list-panel {
                max-height: 50vh;
            }
            .mail-items {
                max-height: calc(50vh - 70px);
            }
            .mail-detail {
                min-height: 45vh;
            }
            .sidebar {
                padding: 6px 12px;
            }
        }

        /* 保证缩放后文字不重叠，所有容器最大宽度100% */
        img, iframe, .attachment-item {
            max-width: 100%;
        }
        .detail-body {
            overflow-x: auto;
        }
    </style>
</head>
<body>
<div class="mail-app">
    <div class="sidebar">
        <div class="logo-area">
            <div class="logo">📧 调查线报</div>
            <div class="logo-sub">安全工作站</div>
        </div>
        <div class="nav-item active">

</div>

<script>
    // ======================== 邮件数据 ========================
    const emails = [
        {
            id: 1,
            from: "苏见秋",
            fromEmail: "su_jianqiu@case.cn",

            date: "2026-03-28 10:32",

            body: `<p>侦探，您好。</p>
                   <p>这份名单是我从旧档案室角落找到的，但复印效果极差，多处字迹洇开。目前只能辨认部分人名和地点，也许对您正在调查的旧案有突破性帮助。</p>
                   <p>请查收附件里的扫描件（整理为PDF），虽然模糊，但配合公开数据也许能拼凑出完整线索。有任何进展随时联络，注意安全。</p>
                   <p>—— 苏见秋</p>`,
            hasAttachment: true,
            attachmentName: "失踪人员名单.pdf",
            attachmentType: "pdf"
        },
        {
            id: 2,
            from: "清港市社会保障中心",
            fromEmail: "service@qinggangsi.gov.cn",
            subject: "关于您社保账户的重要通知",
            date: "2026-03-27 11:02",
            dateDisplay: "3月27日",
            body: `<p>尊敬的参保人，您好。</p>
                   <p>根据系统筛查，您的社保账户存在一条历史缴费记录与当前信息不符的情况。为保障您的社保权益，请您于近期登录官方平台核对个人信息，或携带身份证件至就近社保窗口办理信息更新。</p>
                   <p>如有疑问，可拨打12333热线咨询。感谢您的配合。</p>
                   <p>—— 清港市社会保障中心</p>`,
            hasAttachment: false,
            attachmentName: null
        },
        {
            id: 3,
            from: "李婉清 (委托客户)",
            fromEmail: "liwanqing@client.com",
            subject: "委托调查 · 商业竞争对手背景",
            date: "2026-03-26 09:12",
            dateDisplay: "3月26日",
            body: `<p>侦探先生，您好。</p>
                   <p>冒昧打扰。我所在的公司近期与“恒远科技”有重大合作意向，但对方提供的工商资料部分存疑。希望能委托您帮忙核实其实际股东结构、近三年诉讼记录以及主要关联方。相关报酬可随时商议。</p>
                   <p>附件中是我手头已有的公开信息摘要，请您过目。期待您的回复。</p>
                   <p>—— 李婉清</p>`,
            hasAttachment: false,
            attachmentName: null
        },
        {
            id: 4,
            from: "何教授",
            fromEmail: "he_prof@univ.edu",
            subject: "文献资料分享 · 城市变迁与人口流动",
            date: "2026-03-25 14:20",
            dateDisplay: "3月25日",
            body: `<p>侦探你好，上次你提到对真相揭晓后的心理负担，我整理了近二十年的社会学案例分析。</p>
                   <p>不同结局确实会带来截然不同的影响：揭露真相可能引发社会震动但促进法制完善；而沉默则可能让类似悲剧延续。无论你最终做出什么选择，都请相信追寻真相的过程本身就是一种力量。</p>
                   <p>附上几篇论文索引，有空可以翻阅，或许能让你更平静地面对接下来的发现。</p>
                   <p>—— 何教授</p>`,
            hasAttachment: false,
            attachmentName: null
        },
        {
            id: 5,
            from: "鑫鑫理财",
            fromEmail: "xxlicai@spam.com",
            subject: "恭喜您获得10万元信用额度",
            date: "2026-03-24 08:45",
            dateDisplay: "3月24日",
            body: `<p>尊敬的用户，根据您的信用评估，您已获得我司提供的100,000元备用金资格，年化利率低至3.5%。点击链接即可极速到账，限时3天有效。</p>
                   <p>—— 鑫鑫理财客户经理</p>`,
            hasAttachment: false,
            attachmentName: null
        },
        {
            id: 6,
            from: "正规发票代开",
            fromEmail: "fapiao@spam.net",
            subject: "正规发票代开，点税优惠",
            date: "2026-03-23 14:30",
            dateDisplay: "3月23日",
            body: `<p>专业代开各类正规发票，增值税专用发票、普通发票均可，点税优惠，全国通用。需要请联系微信：fpkf123。</p>
                   <p>—— 发票服务中心</p>`,
            hasAttachment: false,
            attachmentName: null
        },
        {
            id: 7,
            from: "平安保险",
            fromEmail: "service@pingan-insure.com",
            subject: "您的车险即将到期，请及时续保",
            date: "2026-03-22 09:20",
            dateDisplay: "3月22日",
            body: `<p>尊敬的车主，您的车辆保险将于本月末到期，为避免脱保风险，请尽快续保。本月续保可享7折优惠，并赠送洗车服务。</p>
                   <p>—— 平安保险客服中心</p>`,
            hasAttachment: false,
            attachmentName: null
        },
        {
            id: 8,
            from: "清港城市数据平台",
            fromEmail: "admin@qinggangdata.cn",
            subject: "清港城市数据平台 · 账号激活",
            date: "2026-03-20 15:18",
            dateDisplay: "3月20日",
            body: `<p>尊敬的用户，您好。</p>
                   <p>您申请的“清港城市公开数据平台”访问权限已审核通过。您的账号已正式激活，默认登录密码为<strong>您在平台登记的出生年月（8位数字，例如19910423）</strong>。</p>
                   <p>该平台收录了城市地理信息、旧城改造档案、公共设施图纸等，或许能为您正在调研的历史遗留问题提供关键支撑。首次登录后请及时修改密码，并遵守数据使用条例。</p>
                   <p>若有疑问请回复本邮件，祝调查顺利。</p>
                   <p>—— 清港城市数据平台 技术组</p>`,
            hasAttachment: false,
            attachmentName: null
        }
    ];

    // 按日期倒序（最新在上）
    emails.sort((a, b) => new Date(b.date) - new Date(a.date));
    let currentMailId = emails[0].id;

    // 简易防XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // 生成纯文本预览
    function getPlainPreview(htmlBody) {
        let plain = htmlBody.replace(/<[^>]*>/g, '').trim();
        plain = plain.replace(/\s+/g, ' ').slice(0, 70);
        if (plain.length > 68) plain += "...";
        return plain;
    }

    // 渲染邮件列表
    function renderMailList() {
        const container = document.getElementById("mailListContainer");
        if (!container) return;
        container.innerHTML = "";
        emails.forEach(mail => {
            const mailDiv = document.createElement("div");
            mailDiv.className = `mail-item ${currentMailId === mail.id ? 'active' : ''}`;
            mailDiv.setAttribute("data-id", mail.id);
            const plainPreview = getPlainPreview(mail.body);
            const attachmentMark = mail.hasAttachment ? '<span class="attachment-badge">📎 附件</span>' : '';
            // 处理发件人过长截断
            const senderName = escapeHtml(mail.from.length > 28 ? mail.from.slice(0, 26) + '..' : mail.from);
            mailDiv.innerHTML = `
                <div class="mail-info">
                    <div class="mail-sender">
                        <span>${senderName}</span>
                        ${attachmentMark}
                    </div>
                    <div class="mail-subject">${escapeHtml(mail.subject)}</div>
                    <div class="mail-preview">${escapeHtml(plainPreview)}</div>
                </div>
                <div class="mail-date">${escapeHtml(mail.dateDisplay)}</div>
            `;
            mailDiv.addEventListener("click", (e) => {
                e.stopPropagation();
                if (currentMailId === mail.id) return;
                currentMailId = mail.id;
                renderMailList();
                renderMailDetail(mail.id);
                // 移动端点击邮件后，平滑滚动到详情区域，提升阅读体验
                if (window.innerWidth <= 820) {
                    const detailPanel = document.getElementById("mailDetailPanel");
                    if (detailPanel) {
                        setTimeout(() => {
                            detailPanel.scrollIntoView({ behavior: "smooth", block: "start" });
                        }, 80);
                    }
                }
            });
            container.appendChild(mailDiv);
        });
    }

    // 附件点击处理（打开新窗口）
    function openAttachment() {
        // 打开与当前目录同级的 失踪人员名单.html 文件
        window.open('失踪人员名单.html', '_blank');
    }

    // 渲染邮件详情
    function renderMailDetail(mailId) {
        const mail = emails.find(m => m.id === mailId);
        if (!mail) return;
        const detailContainer = document.getElementById("detailContent");
        if (!detailContainer) return;

        let attachmentHtml = '';
        if (mail.hasAttachment && mail.attachmentName === "失踪人员名单.pdf") {
            attachmentHtml = `
                <div class="attachment-area">
                    <div class="attachment-title">附件 (1个)</div>
                    <div class="attachment-item" id="pdfAttachmentBtn">
                        <span class="paperclip-icon">📎</span>
                        <span>${escapeHtml(mail.attachmentName)}</span>
                        <span style="color:#8e9aaf; font-size:11px;">(PDF文档)</span>
                    </div>
                </div>
            `;
        }

        const detailHtml = `
            <div class="detail-header">
                <div class="detail-subject">${escapeHtml(mail.subject)}</div>
                <div class="detail-meta">
                    <div class="detail-sender"><strong>${escapeHtml(mail.from)}</strong> &lt;${escapeHtml(mail.fromEmail)}&gt;</div>
                    <div class="detail-date">${escapeHtml(mail.dateDisplay)}</div>
                </div>
            </div>
            <div class="detail-body">
                ${mail.body}
            </div>
            ${attachmentHtml}
            <div style="margin-top: 40px; border-top: 1px solid #eff2f8; padding-top: 20px; font-size:12px; color:#9aa9bf;">
                🔒 此邮件来自安全通道 · 调查专用
            </div>
        `;
        detailContainer.innerHTML = detailHtml;

        // 绑定附件点击事件
        if (mail.hasAttachment && mail.attachmentName === "失踪人员名单.pdf") {
            const attachBtn = document.getElementById("pdfAttachmentBtn");
            if (attachBtn) {
                attachBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    openAttachment();
                });
            }
        }
    }

    // 初始化界面
    function init() {
        renderMailList();
        renderMailDetail(currentMailId);
        // 小屏幕下避免列表初始滚动位置异常
        if (window.innerWidth <= 820) {
            const listPanel = document.querySelector('.mail-list-panel');
            if (listPanel) listPanel.scrollTop = 0;
        }
    }

    init();
</script>
</body>
</html>
