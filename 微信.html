<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>微信 · 侦探工作台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: text;
        }

        body {
            background: #2e2e2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, 'PingFang SC', '微软雅黑', sans-serif;
        }

        .wechat-desktop {
            width: 1100px;
            height: 700px;
            background: #f5f5f5;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(0, 0, 0, 0.05);
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* 左侧边栏 */
        .sidebar {
            width: 280px;
            background: #2c2f36;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1e1f23;
        }

        .profile-header {
            padding: 18px 16px;
            background: #2c2f36;
            border-bottom: 1px solid #3a3e46;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .profile-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar-sm {
            width: 36px;
            height: 36px;
            background: #07c160;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
        }
        .user-info h4 {
            color: #e9edf2;
            font-size: 15px;
            font-weight: 500;
        }
        .user-info p {
            color: #8b8f9a;
            font-size: 12px;
            margin-top: 2px;
        }
        .add-friend-btn {
            background: #3a3f48;
            border: none;
            color: #e9edf2;
            font-size: 20px;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .add-friend-btn:hover {
            background: #4f5562;
        }

        .contacts-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .contacts-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .contacts-scroll::-webkit-scrollbar-track {
            background: #23262c;
        }
        .contacts-scroll::-webkit-scrollbar-thumb {
            background: #4b4f5a;
            border-radius: 4px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
            cursor: pointer;
            transition: background 0.15s;
            border-left: 3px solid transparent;
        }
        .contact-item.active {
            background: #3a3f48;
            border-left-color: #07c160;
        }
        .contact-item:hover:not(.active) {
            background: #353a43;
        }
        .contact-avatar {
            width: 44px;
            height: 44px;
            background: #40444e;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            color: #cdd2e0;
            flex-shrink: 0;
        }
        .contact-info {
            flex: 1;
            min-width: 0;
        }
        .contact-name {
            font-size: 15px;
            font-weight: 500;
            color: #f0f2f5;
            margin-bottom: 4px;
        }
        .contact-preview {
            font-size: 12px;
            color: #8b8f9a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .footer-tools {
            padding: 14px 16px;
            border-top: 1px solid #3a3e46;
            background: #2c2f36;
        }
        .moments-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #3a3f48;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: #e9edf2;
        }
        .moments-btn:hover {
            background: #4a4f5a;
        }
        .moments-btn span:first-child {
            font-size: 20px;
        }
        .moments-btn span:last-child {
            font-size: 14px;
            font-weight: 500;
        }
        .moments-btn.active {
            background: #07c160;
            color: white;
        }

        /* 右侧主区域 */
        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #eef0f2;
            overflow: hidden;
        }

        .chat-header {
            padding: 16px 24px;
            background: #ffffff;
            border-bottom: 1px solid #e2e4e8;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .chat-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: #1f2a3a;
        }

        .chat-messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #eef0f2;
        }
        .message-row {
            display: flex;
            width: 100%;
        }
        .message-row.me {
            justify-content: flex-end;
        }
        
        /* 关键修复：让气泡宽度自适应内容，而不是撑满父容器 */
        .message-row .bubble-wrapper {
            max-width: 70%;
            display: flex;
            flex-direction: column;
        }
        /* 自己的消息容器右对齐 */
        .message-row.me .bubble-wrapper {
            align-items: flex-end;
        }
        /* 他人的消息容器左对齐 */
        .message-row.other .bubble-wrapper {
            align-items: flex-start;
        }
        
        .bubble {
            display: inline-block;        /* 关键修复：让气泡宽度根据内容收缩 */
            max-width: 100%;              /* 保证长文本不超出父容器 */
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.45;
            word-break: break-word;
            white-space: normal;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }
        .message-row.other .bubble {
            background: #ffffff;
            border: 1px solid #e6e9ef;
            color: #1f2a3a;
            border-top-left-radius: 4px;
        }
        .message-row.me .bubble {
            background: #07c160;
            color: white;
            border-top-right-radius: 4px;
        }
        .sender-name {
            font-size: 11px;
            margin-bottom: 4px;
            color: #8d93a0;
            width: 100%;
        }
        .message-row.other .sender-name {
            text-align: left;
            padding-left: 6px;
        }
        .message-row.me .sender-name {
            text-align: right;
            padding-right: 6px;
        }

        /* 输入区域 */
        .chat-input-area {
            background: #ffffff;
            border-top: 1px solid #e2e4e8;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .chat-input {
            flex: 1;
            border: 1px solid #e2e4e8;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: 0.2s;
            max-height: 80px;
            line-height: 1.4;
        }
        .chat-input:focus {
            border-color: #07c160;
        }
        .send-btn {
            background: #07c160;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .send-btn:hover {
            background: #06ad56;
        }

        .chat-tip {
            text-align: center;
            font-size: 12px;
            color: #b0b7c4;
            margin-top: 12px;
        }

        /* 朋友圈样式 */
        .moments-container {
            flex: 1;
            overflow-y: auto;
            background: #f2f4f8;
            padding: 20px 28px;
        }
        .moment-card {
            background: white;
            border-radius: 16px;
            margin-bottom: 20px;
            padding: 16px 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }
        .moment-header {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .moment-avatar {
            width: 44px;
            height: 44px;
            background: #bec3cc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: #2c3e4e;
            flex-shrink: 0;
        }
        .moment-info {
            flex: 1;
        }
        .moment-name {
            font-weight: 600;
            font-size: 15px;
            color: #1a2c3e;
        }
        .moment-time {
            font-size: 11px;
            color: #9aa3b0;
            margin-top: 4px;
        }
        .moment-content {
            font-size: 15px;
            line-height: 1.48;
            color: #2c3e4e;
            margin: 8px 0 10px 0;
            padding-left: 56px;
        }
        .moment-action {
            padding-left: 56px;
            font-size: 12px;
            color: #8f99ab;
            border-top: 1px solid #eff0f2;
            padding-top: 10px;
            margin-top: 6px;
            display: flex;
            gap: 20px;
        }
        .moment-action span {
            cursor: default;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e6ec;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c9d2;
            border-radius: 4px;
        }

        /* 微信风格弹窗 (模态框) */
        .wechat-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(2px);
        }
        .wechat-modal {
            width: 280px;
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
            animation: modalFadeIn 0.2s ease;
        }
        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .modal-header {
            padding: 20px 20px 8px 20px;
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            color: #1f2a3a;
        }
        .modal-body {
            padding: 8px 20px 16px 20px;
        }
        .modal-input {
            width: 100%;
            border: 1px solid #e2e4e8;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
        }
        .modal-input:focus {
            border-color: #07c160;
        }
        .modal-error {
            color: #fa5151;
            font-size: 12px;
            margin-top: 8px;
            padding-left: 4px;
        }
        .modal-actions {
            display: flex;
            border-top: 1px solid #e2e4e8;
        }
        .modal-btn {
            flex: 1;
            text-align: center;
            padding: 14px 0;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .modal-btn.cancel {
            color: #8e9aaf;
            border-right: 1px solid #e2e4e8;
        }
        .modal-btn.confirm {
            color: #07c160;
        }
        .modal-btn:hover {
            background: #f5f7fa;
        }

        /* 微信风格 Toast 提示 */
        .wechat-toast {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1100;
            white-space: nowrap;
            pointer-events: none;
            animation: toastFade 2s ease forwards;
        }
        @keyframes toastFade {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(10px);
            }
            15% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            85% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
                visibility: hidden;
            }
        }

        @media (max-width: 820px) {
            .wechat-modal {
                width: 260px;
            }
            .modal-header {
                padding: 18px 16px 6px;
                font-size: 16px;
            }
            .modal-body {
                padding: 6px 16px 12px;
            }
            .modal-input {
                padding: 10px 14px;
                font-size: 14px;
            }
            .modal-btn {
                padding: 12px 0;
                font-size: 15px;
            }
            .wechat-toast {
                font-size: 13px;
                padding: 8px 18px;
                bottom: 35%;
            }
            .bubble-wrapper {
                max-width: 85% !important;
            }
        }
    </style>
</head>
<body>
<div class="wechat-desktop">
    <!-- 左侧区域 -->
    <div class="sidebar">
        <div class="profile-header">
            <div class="profile-left">
                <div class="avatar-sm">侦</div>
                <div class="user-info">
                    <h4>暗夜调查者</h4>
                    <p>ID: detective_x</p>
                </div>
            </div>
            <button class="add-friend-btn" id="addFriendBtn" title="添加好友">➕</button>
        </div>

        <div class="contacts-scroll" id="contactsList">
            <!-- 动态联系人列表 -->
        </div>

        <div class="footer-tools">
            <div class="moments-btn" id="momentsToggleBtn">
                <span>📷</span>
                <span>朋友圈</span>
            </div>
        </div>
    </div>

    <!-- 右侧动态面板 -->
    <div class="main-panel" id="mainPanel"></div>
</div>

<script>
    // ---------- 辅助函数：移除emoji（保证朋友圈干净）----------
    function removeEmoji(text) {
        const emojiRegex = /[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F700}-\u{1F77F}\u{1F780}-\u{1F7FF}\u{1F800}-\u{1F8FF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{FE0F}\u{1F1E6}-\u{1F1FF}]/gu;
        return text.replace(emojiRegex, '').trim();
    }

    // ---------- 数据定义 ----------
    let contactsData = [
        {
            id: "sujianqiu",
            name: "苏见秋",
            avatar: "苏",
            messages: [
                { sender: "苏见秋", text: "老林，有个事想委托你，这十七个人，在三年内陆续失踪了。" },
                { sender: "me", text: "报案了吗？" },
                { sender: "苏见秋", text: "报过。每个案子都被定性为‘主动失联’或‘自愿离职’。没有家属持续追问，没有媒体跟进。他们就像……被从系统里抹掉了。我这只有一份模糊的名单，我发到你邮箱了。" },
                { sender: "me", text: "好，我一定会查出真相的。" }
            ]
        },
        {
            id: "laozheng",
            name: "老郑",
            avatar: "郑",
            messages: [
                { sender: "老郑", text: "对了，刚才电话里忘了说，有个城市公开数据平台也许能发现点什么。" },
                { sender: "老郑", text: "还有，上次跟你说的凯撒密码一定要保护好密文！" },   // 修改后的内容
                { sender: "me", text: "知道了，放心吧！" }   // 新增我的回复
            ]
        },
        {
            id: "hejiaoshou",
            name: "何教授",
            avatar: "何",
            messages: [
                { sender: "me", text: "何教授，我突然有点迷茫，要是发现真相后不知道该怎么办……" },
                { sender: "何教授", text: "每一个真相都是一把双刃剑。揭露可能带来正义，也可能伤害无辜；隐瞒或许维持平静，却会留下遗憾。不同结局会影响你的信念和未来道路，但追寻真相的过程会让你真正成长。无论结果如何，忠于内心即可。" }
            ]
        },
        {
            id: "zhangnvshi",
            name: "张女士",
            avatar: "张",
            messages: [
                { sender: "张女士", text: "侦探您好，我家猫咪“团子”走丢三天了，能帮忙找找吗？附近监控太少了。" },
                { sender: "me", text: "别着急，我会帮您留意社区线索，并张贴寻猫启事，也会问问附近爱猫人士，请放心。" }
            ]
        },
        {
            id: "chenxiansheng",
            name: "陈先生",
            avatar: "陈",
            messages: [
                { sender: "陈先生", text: "我怀疑合伙人在账目上做手脚，想请您帮忙调查一些公开商业数据。" },
                { sender: "me", text: "明白您的顾虑。我会在法律允许范围内梳理工商信息和公开报表，给出客观分析。" }
            ]
        },
        {
            id: "zhoujie",
            name: "周姐（书店店主）",
            avatar: "周",
            messages: [
                { sender: "周姐", text: "小侦探，店里最近总有人半夜撬门，可以帮我分析下监控角度吗？" },
                { sender: "me", text: "没问题，我今晚帮您调整监控位置，再加强周边巡查，有异常立刻联系您。" }
            ]
        }
    ];

    // 朋友圈数据
    const momentsDataRaw = [
        { id: "my_moment_1", userName: "暗夜调查者", avatar: "侦", content: "解决了当侦探以来的第一个案子！好有成就感！", time: "2016.6.6", isSelf: true },
        { id: "he_moment_1", userName: "何教授", avatar: "何", content: "真相的重量往往超乎想象，但逃避只会让迷雾更浓。给勇敢的调查者点赞。", time: "2026.6.9", isSelf: false },
        { id: "he_moment_2", userName: "何教授", avatar: "何", content: "在图书馆发现一本珍贵的旧书，如获至宝。安静阅读的下午，很是惬意。", time: "2026.7.19", isSelf: false },
        { id: "zhang_moment_1", userName: "张女士", avatar: "张", content: "感谢侦探！团子今天自己跑回来了，还带了邻居家的小鱼干 太感谢了！", time: "2026.6.10", isSelf: false },
        { id: "zhang_moment_2", userName: "张女士", avatar: "张", content: "团子学会开门了，真是个机灵鬼。每天都有新惊喜。", time: "2026.7.20", isSelf: false },
        { id: "chen_moment_1", userName: "陈先生", avatar: "陈", content: "多亏侦探梳理的工商资料，避免了一次重大失误。专业且靠谱。", time: "2026.6.11", isSelf: false },
        { id: "chen_moment_2", userName: "陈先生", avatar: "陈", content: "难得全家人一起吃饭，简单又幸福。", time: "2026.7.18", isSelf: false },
        { id: "zhou_moment_1", userName: "周姐（书店店主）", avatar: "周", content: "侦探帮忙调整监控后，晚上安心多了。今天店里还多了几位爱看推理小说的客人。", time: "2026.6.12", isSelf: false },
        { id: "zhou_moment_2", userName: "周姐（书店店主）", avatar: "周", content: "今天书店来了几位小读者，安安静静看书的样子真美好。", time: "2026.7.22", isSelf: false }
    ];
    const momentsData = momentsDataRaw.map(m => ({ ...m, content: removeEmoji(m.content) }));

    // 自动回复相关 (仅用于发票代开)
    const AUTO_REPLY_TEXTS = [
        "您好，我是做正规发票代开的，全品类都能开，增值税专用、普通、电子票都有，真实可查。我这边走内部渠道，价格低、出票快，绝对安全。需要的话可以随时找我，量大还能再优惠。",
        "我们保证所有发票均可在税局官网查验，绝对正规。您需要哪种类型的发票？我可以给您详细报价。",
        "价格方面很透明，增值税专用票点税低至3.5个点，普通票更优惠，量大还可以再商量。开票后提供查验截图，放心交易。"
    ];
    let autoReplyCountMap = new Map();

    let currentMode = 'chat';
    let currentContactId = contactsData[0].id;

    function getContactById(id) {
        return contactsData.find(c => c.id === id);
    }

    function updateContactPreview(contactId) {
        const contact = getContactById(contactId);
        if (!contact) return;
        const lastMsg = contact.messages[contact.messages.length - 1];
        let preview = "暂无消息";
        if (lastMsg) {
            const sender = lastMsg.sender === "me" ? "我" : lastMsg.sender;
            let content = lastMsg.text;
            if (content.length > 28) content = content.slice(0, 26) + "...";
            preview = `${sender}: ${content}`;
        }
        renderContactsList(currentMode === 'chat' ? currentContactId : null);
    }

    function addMessage(contactId, sender, text) {
        const contact = getContactById(contactId);
        if (!contact) return false;
        contact.messages.push({ sender, text });
        if (currentMode === 'chat' && currentContactId === contactId) {
            renderChatInterface(currentContactId);
        }
        updateContactPreview(contactId);
        return true;
    }

    function sendFirstAutoMessage(contactId) {
        const contact = getContactById(contactId);
        if (!contact) return;
        addMessage(contactId, contact.name, AUTO_REPLY_TEXTS[0]);
        autoReplyCountMap.set(contactId, 1);
    }

    // 添加“蔚蓝-赵明远”好友后自动发送预设对话
    function initZhaoMingyuanConversation(contactId) {
        const contact = getContactById(contactId);
        if (!contact) return;
        // 避免重复添加（确保消息列表为空时才添加初始对话）
        if (contact.messages.length === 0) {
            // 我说
            addMessage(contactId, "me", "你好，我是何云峰介绍来的，想入职该公司运营部，想跟你了解一下情况，福利待遇和工作压力之类的。");
            // 对方回复
            addMessage(contactId, contact.name, "福利待遇就是hr跟你讲的那些，但是工作压力确实比较大，经常有人承受不住压力辞职，如果你能承受压力而且能接受强制调岗的话可以考虑，还有如果你状态真的很差的话公司会给你安排休假的。");
        }
    }

    // 微信风格 Toast 提示
    function showToast(message) {
        const existingToast = document.querySelector('.wechat-toast');
        if (existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'wechat-toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.remove();
        }, 2000);
    }

    // 微信风格模态框 (添加好友) ———— 支持 fpkf123 和 zhaomingyuan123
    function showAddFriendModal() {
        const overlay = document.createElement('div');
        overlay.className = 'wechat-modal-overlay';
        
        const modal = document.createElement('div');
        modal.className = 'wechat-modal';
        modal.innerHTML = `
            <div class="modal-header">添加好友</div>
            <div class="modal-body">
                <input type="text" class="modal-input" id="friendWechatId" placeholder="请输入微信号" autocomplete="off">
                <div class="modal-error" id="modalErrorMsg" style="display: none;"></div>
            </div>
            <div class="modal-actions">
                <div class="modal-btn cancel" id="modalCancelBtn">取消</div>
                <div class="modal-btn confirm" id="modalConfirmBtn">确定</div>
            </div>
        `;
        overlay.appendChild(modal);
        document.body.appendChild(overlay);
        
        const inputEl = modal.querySelector('#friendWechatId');
        const errorEl = modal.querySelector('#modalErrorMsg');
        const cancelBtn = modal.querySelector('#modalCancelBtn');
        const confirmBtn = modal.querySelector('#modalConfirmBtn');
        
        setTimeout(() => inputEl.focus(), 50);
        
        const closeModal = () => {
            overlay.remove();
        };
        
        const handleConfirm = () => {
            const wechatId = inputEl.value.trim();
            if (!wechatId) {
                errorEl.textContent = '微信号不能为空';
                errorEl.style.display = 'block';
                return;
            }
            // 处理发票代开好友
            if (wechatId === "fpkf123") {
                const existing = contactsData.find(c => c.id === "fpkf123");
                if (existing) {
                    closeModal();
                    showToast('该好友已经是您的联系人');
                    if (currentMode === 'moments') {
                        document.getElementById("momentsToggleBtn")?.classList.remove("active");
                        currentMode = 'chat';
                    }
                    currentContactId = "fpkf123";
                    renderContactsList(currentContactId);
                    renderChatInterface(currentContactId);
                    return;
                }
                const newFriend = {
                    id: "fpkf123",
                    name: "AAA专业发票代开",
                    avatar: "票",
                    messages: []
                };
                contactsData.push(newFriend);
                autoReplyCountMap.set("fpkf123", 0);
                closeModal();
                showToast('添加成功');
                if (currentMode === 'moments') {
                    document.getElementById("momentsToggleBtn")?.classList.remove("active");
                    currentMode = 'chat';
                }
                currentContactId = "fpkf123";
                renderContactsList(currentContactId);
                renderChatInterface(currentContactId);
                sendFirstAutoMessage("fpkf123");
                return;
            }
            // 处理蔚蓝-赵明远好友
            if (wechatId === "zhaomingyuan123") {
                const existing = contactsData.find(c => c.id === "zhaomingyuan123");
                if (existing) {
                    closeModal();
                    showToast('该好友已经是您的联系人');
                    if (currentMode === 'moments') {
                        document.getElementById("momentsToggleBtn")?.classList.remove("active");
                        currentMode = 'chat';
                    }
                    currentContactId = "zhaomingyuan123";
                    renderContactsList(currentContactId);
                    renderChatInterface(currentContactId);
                    return;
                }
                const newFriend = {
                    id: "zhaomingyuan123",
                    name: "蔚蓝-赵明远",
                    avatar: "赵",
                    messages: []
                };
                contactsData.push(newFriend);
                closeModal();
                showToast('添加成功');
                if (currentMode === 'moments') {
                    document.getElementById("momentsToggleBtn")?.classList.remove("active");
                    currentMode = 'chat';
                }
                currentContactId = "zhaomingyuan123";
                renderContactsList(currentContactId);
                renderChatInterface(currentContactId);
                // 初始化对话（发送预设的两条消息）
                initZhaoMingyuanConversation("zhaomingyuan123");
                return;
            }
            // 未匹配任何已知微信号
            errorEl.textContent = '未找到该用户，微信号不正确。';
            errorEl.style.display = 'block';
        };
        
        cancelBtn.addEventListener('click', closeModal);
        confirmBtn.addEventListener('click', handleConfirm);
        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleConfirm();
        });
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeModal();
        });
    }
    
    // 渲染联系人列表
    function renderContactsList(activeId) {
        const container = document.getElementById("contactsList");
        if (!container) return;
        container.innerHTML = "";
        contactsData.forEach(contact => {
            const lastMsg = contact.messages[contact.messages.length - 1];
            let preview = "暂无消息";
            if (lastMsg) {
                const sender = lastMsg.sender === "me" ? "我" : lastMsg.sender;
                let content = lastMsg.text;
                if (content.length > 28) content = content.slice(0, 26) + "...";
                preview = `${sender}: ${content}`;
            }
            const div = document.createElement("div");
            div.className = `contact-item ${activeId === contact.id ? 'active' : ''}`;
            div.setAttribute("data-id", contact.id);
            div.innerHTML = `
                <div class="contact-avatar">${escapeHtml(contact.avatar)}</div>
                <div class="contact-info">
                    <div class="contact-name">${escapeHtml(contact.name)}</div>
                    <div class="contact-preview">${escapeHtml(preview)}</div>
                </div>
            `;
            div.addEventListener("click", () => {
                if (currentMode === 'moments') {
                    currentMode = 'chat';
                    document.getElementById("momentsToggleBtn")?.classList.remove("active");
                }
                currentContactId = contact.id;
                renderContactsList(currentContactId);
                renderChatInterface(currentContactId);
            });
            container.appendChild(div);
        });
    }
    
    // 修复后的聊天界面渲染：使用新的气泡结构使宽度自适应内容
    function renderChatInterface(contactId) {
        const contact = getContactById(contactId);
        if (!contact) return;
        const mainPanel = document.getElementById("mainPanel");
        if (!mainPanel) return;
        let messagesHtml = `<div class="chat-header"><h2>${escapeHtml(contact.name)}</h2></div>`;
        messagesHtml += `<div class="chat-messages-area" id="chatMessagesArea">`;
        contact.messages.forEach(msg => {
            const isMe = msg.sender === "me";
            const senderDisplay = isMe ? "我" : msg.sender;
            const rowClass = isMe ? "message-row me" : "message-row other";
            messagesHtml += `
                <div class="${rowClass}">
                    <div class="bubble-wrapper">
                        <div class="sender-name">${escapeHtml(senderDisplay)}</div>
                        <div class="bubble">${escapeHtml(msg.text).replace(/\n/g, '<br>')}</div>
                    </div>
                </div>
            `;
        });
        messagesHtml += `<div class="chat-tip">—— 仅展示历史对话 ——</div>`;
        messagesHtml += `</div>`;
        messagesHtml += `
            <div class="chat-input-area">
                <textarea class="chat-input" id="chatInput" rows="1" placeholder="输入消息..."></textarea>
                <button class="send-btn" id="sendMsgBtn">发送</button>
            </div>
        `;
        mainPanel.innerHTML = messagesHtml;
        setTimeout(() => {
            const msgArea = document.getElementById("chatMessagesArea");
            if (msgArea) msgArea.scrollTop = msgArea.scrollHeight;
            const textarea = document.getElementById("chatInput");
            if (textarea) {
                textarea.addEventListener("keydown", (e) => {
                    if (e.key === "Enter" && !e.shiftKey) {
                        e.preventDefault();
                        document.getElementById("sendMsgBtn")?.click();
                    }
                });
                textarea.addEventListener("input", function() {
                    this.style.height = "auto";
                    this.style.height = Math.min(this.scrollHeight, 80) + "px";
                });
            }
        }, 20);
        const sendBtn = document.getElementById("sendMsgBtn");
        if (sendBtn) {
            sendBtn.addEventListener("click", () => handleSendMessage(contactId));
        }
    }
    
    function handleSendMessage(contactId) {
        const inputEl = document.getElementById("chatInput");
        if (!inputEl) return;
        const rawText = inputEl.value.trim();
        if (rawText === "") return;
        const userText = rawText;
        inputEl.value = "";
        inputEl.style.height = "auto";
        addMessage(contactId, "me", userText);
        const contact = getContactById(contactId);
        if (!contact) return;
        // 仅对发票代开好友进行自动回复，蔚蓝-赵明远不触发自动回复（已有初始对话，后续用户发送消息不再自动回复）
        const isInvoiceFriend = (contact.id === "fpkf123" && contact.name === "AAA专业发票代开");
        if (isInvoiceFriend) {
            let count = autoReplyCountMap.get(contactId) || 0;
            if (count < 3) {
                const replyIndex = count;
                if (replyIndex < AUTO_REPLY_TEXTS.length) {
                    const replyText = AUTO_REPLY_TEXTS[replyIndex];
                    addMessage(contactId, contact.name, replyText);
                    autoReplyCountMap.set(contactId, count + 1);
                }
            }
        }
    }
    
    function renderMoments() {
        const mainPanel = document.getElementById("mainPanel");
        if (!mainPanel) return;
        let momentsHtml = `<div class="chat-header"><h2>📱 朋友圈</h2></div>`;
        momentsHtml += `<div class="moments-container">`;
        const sorted = [...momentsData].reverse();
        sorted.forEach(m => {
            const cleanContent = removeEmoji(m.content);
            momentsHtml += `
                <div class="moment-card">
                    <div class="moment-header">
                        <div class="moment-avatar">${escapeHtml(m.avatar)}</div>
                        <div class="moment-info">
                            <div class="moment-name">${escapeHtml(m.userName)}</div>
                            <div class="moment-time">${escapeHtml(m.time)}</div>
                        </div>
                    </div>
                    <div class="moment-content">${escapeHtml(cleanContent)}</div>
                    <div class="moment-action">
                        <span>❤️ 赞</span>
                        <span>💬 评论</span>
                    </div>
                </div>
            `;
        });
        momentsHtml += `</div>`;
        mainPanel.innerHTML = momentsHtml;
    }
    
    function switchToMomentsMode() {
        currentMode = 'moments';
        renderContactsList(null);
        renderMoments();
        const momentsBtn = document.getElementById("momentsToggleBtn");
        if (momentsBtn) momentsBtn.classList.add("active");
    }
    
    function switchToChatMode(contactId) {
        currentMode = 'chat';
        currentContactId = contactId;
        renderContactsList(currentContactId);
        renderChatInterface(currentContactId);
        const momentsBtn = document.getElementById("momentsToggleBtn");
        if (momentsBtn) momentsBtn.classList.remove("active");
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    function init() {
        renderContactsList(currentContactId);
        renderChatInterface(currentContactId);
        currentMode = 'chat';
        const momentsBtn = document.getElementById("momentsToggleBtn");
        if (momentsBtn) {
            momentsBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                if (currentMode === 'moments') {
                    renderMoments();
                } else {
                    switchToMomentsMode();
                }
            });
        }
        const addBtn = document.getElementById("addFriendBtn");
        if (addBtn) {
            addBtn.addEventListener("click", () => {
                showAddFriendModal();
            });
        }
    }
    
    window.addEventListener("DOMContentLoaded", init);
</script>
